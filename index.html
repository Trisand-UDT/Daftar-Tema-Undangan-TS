<style>
    @font-face {
        font-family: 'Delius-Regular';

    * {
        box-sizing: border-box;
        margin: 0;

    }

    body {
        /* Latar belakang arang gelap dengan ambient pancaran cahaya emas redup */
        background: radial-gradient(circle at top right, #2c2514 0%, #0a0a0a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;    
        justify-content: center;

    }

    .wrapper {
        max-width: 440px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(26, 22, 15, 0.75); /* Lapisan kaca dengan tone hangat */

        -webkit-backdrop-filter: blur(20px);
        padding: 45px 25px;
        border-radius: 28px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(212, 175, 55, 0.15); /* Bingkai tipis warna emas */
    }
    
    @property --angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
    }

    /* --- LOGO: BORDER BERPUTAR DENGAN TONE EMAS EKSKLUSIF --- */
    .logo-container {
        position: relative;
        width: 140px; 
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 28px;
        border-radius: 10px;
        /* Menggunakan gradasi warna emas-perunggu yang mengalir tenang */
        background: conic-gradient(from var(--angle), transparent 20%, #d4af37, #e2cb83, transparent 80%);
        padding: 4px; 
        animation: spinAngle 3s linear infinite;
    }

    @keyframes spinAngle {
        from { --angle: 0deg; }
        to { --angle: 360deg; }
    }

    .logo-inner {
        width: 100%;
        height: 100%;
        background: #0a0a0a; /* Dasar hitam pekat agar logo kontras jelas */
        border-radius: 7px; 
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    
    .logo-main {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 10px; 
        filter: drop-shadow(0 4px 12px rgba(212, 175, 55, 0.3));
    }
    
    .main-title {
        font-size: 24px;
        font-weight: 900; 
        color: #ffffff; 
        text-align: center;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6); 
    }
    
    .main-subtitle {
        font-size: 14px;
        color: #cbd5e1; 
        text-align: center;
        margin-bottom: 35px;
        letter-spacing: 0.5px;
        font-weight: 600; 
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    }
    
    .menu-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    
    /* --- TOMBOL MENU: HITAM SOLID DENGAN BORDER EMAS BERDENYUT --- */
    .menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 18px 24px;
        background: #111111; /* Latar Belakang Hitam Solid */
        color: #ffffff; 
        text-decoration: none;
        border-radius: 16px;
        font-size: 15px;
        font-weight: 800; 
        letter-spacing: 0.7px; /* Spasi huruf 0.7px tetap dipertahankan */
        position: relative;
        z-index: 1;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        /* Animasi Gelombang Pendaran Cahaya Emas Konstan */
        animation: neonGlowPulse 2.5s infinite ease-in-out;
    }

    /* Efek Border Dua Gradasi Emas Berdenyut Bergerak */
    .menu-btn::before {
        content: '';
        position: absolute;
        z-index: -1;
        inset: 0;
        padding: 2.5px; /* Ketebalan garis tepi border */
        border-radius: 16px;
        /* Aliran warna perunggu hingga emas murni yang anggun, tidak ramai warna-warni */
        background: conic-gradient(from var(--angle), #d4af37, #4a3b11, #d4af37);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: spinAngle 5s linear infinite; /* Garis tepi berputar dinamis */
        transition: all 0.3s ease;
    }

    /* Efek Hover: Transformasi Penuh Menjadi Emas Klasik Solid & Mewah */
    .menu-btn:hover {
        transform: translateY(-4px) scale(1.01);
        background: #d4af37; /* Latar berubah menjadi Emas Klasik saat di-hover */
        color: #0a0a0a; /* Tulisan berubah menjadi hitam pekat agar kontras tajam */
        box-shadow: 0 15px 30px rgba(212, 175, 55, 0.35), 
                    0 0 40px rgba(212, 175, 55, 0.15);
        animation: none; /* Menghentikan animasi denyut saat kursor fokus */
    }

    .menu-btn:hover::before {
        background: #e2cb83; /* Bingkai luar mencerah saat di-hover */
        animation: none;
    }

    /* Ikon FontAwesome otomatis berubah warna hitam saat tombol di-hover */
    .menu-btn:hover i {
        color: #0a0a0a !important;
        transform: scale(1.2);
        filter: drop-shadow(0 0 6px rgba(10, 10, 10, 0.3));
    }
    
    .menu-btn i {
        font-size: 18px;
        transition: all 0.3s ease;
    }

    /* --- DEFINISI ANIMASI EFEK EMAS --- */

    /* Animasi Denyut Pancaran Cahaya Luar (Neon Gold Outer Glow Wave) yang Kalem */
    @keyframes neonGlowPulse {
        0%, 100% {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5),
                        0 0 10px rgba(212, 175, 55, 0.1);
        }
        50% {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3),
                        0 0 25px rgba(212, 175, 55, 0.3); /* Pancaran Emas mengembang jelas dan lembut */
        }
    }
</style>
